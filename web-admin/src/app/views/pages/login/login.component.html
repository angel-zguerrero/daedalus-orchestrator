<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <c-card class="p-4">
            <c-card-body>
              <form cForm #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
                <h1>Login</h1>
                <p class="text-body-secondary">Sign In to your account</p>

                <c-alert color="danger" *ngIf="loginError" class="mt-3">
                  {{ loginError }}
                </c-alert>

                <c-input-group class="mb-3">
                  <span cInputGroupText>
                    <svg cIcon name="cilUser"></svg>
                  </span>
                  <input
                    autoComplete="username"
                    cFormControl
                    placeholder="Username"
                    name="username"
                    ngModel
                    required
                    #username="ngModel"
                  />
                </c-input-group>
                <div *ngIf="username.invalid && (username.dirty || username.touched || loginForm.submitted)"
                     cTextColor="danger" class="form-text">
                  <small *ngIf="username.errors?.['required']">Username is required.</small>
                </div>

                <c-input-group class="mb-4">
                  <span cInputGroupText>
                    <svg cIcon name="cilLockLocked"></svg>
                  </span>
                  <input
                    autoComplete="current-password"
                    cFormControl
                    placeholder="Password"
                    type="password"
                    name="password"
                    ngModel
                    required
                    #password="ngModel"
                  />
                </c-input-group>
                <div *ngIf="password.invalid && (password.dirty || password.touched || loginForm.submitted)"
                     cTextColor="danger" class="form-text">
                  <small *ngIf="password.errors?.['required']">Password is required.</small>
                </div>

                <c-row>
                  <c-col xs="6">
                    <button cButton class="px-4" color="primary" type="submit" [disabled]="isLoading || loginForm.invalid">
                      <span *ngIf="isLoading" cSpinner component="span" size="sm" aria-hidden="true"></span>
                      <span *ngIf="isLoading"> Logging in...</span>
                      <span *ngIf="!isLoading">Login</span>
                    </button>
                  </c-col>
                  <c-col class="text-end" xs="6">
                    <button cButton class="px-0" color="link" type="button">
                      Forgot password?
                    </button>
                  </c-col>
                </c-row>
              </form>
            </c-card-body>
          </c-card>
          <c-card [ngStyle]="{'minWidth.%': 44}" class="text-white bg-primary py-5">
            <c-card-body class="text-center">
              <div>
                <h2>Sign up</h2>
                <p>
                  Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod
                  tempor incididunt ut labore et dolore magna aliqua.
                </p>
                <button [active]="true" cButton class="mt-3" color="primary" routerLink="/register" type="button">
                  Register Now!
                </button>
              </div>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
