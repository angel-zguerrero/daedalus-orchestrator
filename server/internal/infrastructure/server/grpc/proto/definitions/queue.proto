syntax = "proto3";

package queue;

option go_package = "pb/queue;queue";

enum QueueType {
  STANDARD = 0;
  DELAYED = 1;
  DEAD_LETTER = 2;
}

service QueueService {
  rpc CreateQueue (CreateQueueRequest) returns (CreateQueueResponse);
  rpc BulkCreateQueue (BulkCreateQueueRequest) returns (BulkCreateQueueResponse);
  rpc GetQueue (GetQueueRequest) returns (GetQueueResponse);
  rpc GetQueues (GetQueuesRequest) returns (GetQueuesResponse);
  rpc DeleteQueue (DeleteQueueRequest) returns (DeleteQueueResponse);
  rpc EnqueueMessage (EnqueueMessageRequest) returns (EnqueueMessageResponse);
}

message CreateQueueRequest {
  string tenantCode = 1;
  string code = 2;
  string name = 3;
  string type = 4;
  string state = 5;
  string vnamespace = 6;
  int32 defaultQueueMessageTTL = 7;
  int32 defaultQueueMessageDelayTime = 8;
  int32 queueExpires = 9;
  bool allowDuplicated = 10;
  int32 maxAttempts = 11;
  map<int32, int32> desiredPriorityThresholds = 12;
  map<string, string> headers = 13;
  string deadLetterExchangeId = 14;
  string deadLetterExchangeRoutingKeyOrPattern = 15;
}

message CreateQueueResponse {
  string message = 1;
  Queue result = 2;
}

message BulkCreateQueueRequest {
  string tenantCode = 1;
  repeated CreateQueueItem queues = 2;
}

message CreateQueueItem {
  string code = 1;
  string name = 2;
  string type = 3;
  string state = 4;
  string vnamespace = 5;
  int32 defaultQueueMessageTTL = 6;
  int32 defaultQueueMessageDelayTime = 7;
  int32 queueExpires = 8;
  bool allowDuplicated = 9;
  int32 maxAttempts = 10;
  map<int32, int32> desiredPriorityThresholds = 11;
  map<string, string> headers = 12;
  string deadLetterExchangeId = 13;
  string deadLetterExchangeRoutingKeyOrPattern = 14;
}

message BulkCreateQueueResponse {
  string message = 1;
  repeated Queue result = 2;
}

message GetQueueRequest {
  string tenantCode = 1;
  string code = 2;
  string vnamespace = 3;
}

message GetQueueResponse {
  string message = 1;
  Queue result = 2;
}

message GetQueuesRequest {
  string tenantCode = 1;
  string q = 2;
  string cursor = 3;
  int32 pageSize = 4;
  string vnamespace = 5;
  bool includeHeaders = 6;
}

message Queue {
  string id = 1;
  string code = 2;
  string name = 3;
  string type = 4;
  string state = 5;
  string vnamespace = 6;
  string createdAt = 7;
  string updatedAt = 8;
  int32 defaultQueueMessageTTL = 9;
  int32 defaultQueueMessageDelayTime = 10;
  int32 queueExpires = 11;
  string expireAt = 12;
  bool allowDuplicated = 13;
  int32 maxAttempts = 14;
  map<int32, int32> desiredPriorityThresholds = 15;
  map<int32, int32> priorityThresholds = 16;
  map<string, string> headers = 17;
  string deadLetterExchangeId = 18;
  string deadLetterExchangeRoutingKeyOrPattern = 19;
}

message QueueFindResult {
  repeated Queue entities = 1;
  string cursor = 2;
}

message GetQueuesResponse {
  string message = 1;
  QueueFindResult result = 2;
}

message DeleteQueueRequest {
  string tenantCode = 1;
  string code = 2;
  string vnamespace = 3;
}

message DeleteQueueResponse {
  string message = 1;
}

message EnqueueMessageRequest {
  string tenantCode = 1;
  string queueCode = 2;
  string vnamespace = 3;
  string content = 4;
  string contentType = 5;
  map<string, string> headers = 6;
  int32 priority = 7;
  string handler = 8;
  map<string, string> parameters = 9;
}

message EnqueueMessageResponse {
  string message = 1;
  string messageId = 2;
  map<string, string> result = 3;
}

