syntax = "proto3";

package queue;

option go_package = "pb/queue;queue";

enum QueueType {
  STANDARD = 0;
  DELAYED = 1;
  DEAD_LETTER = 2;
}

service QueueService {
  rpc CreateQueue (CreateQueueRequest) returns (CreateQueueResponse);
  rpc BulkCreateQueue (BulkCreateQueueRequest) returns (BulkCreateQueueResponse);
  rpc GetQueue (GetQueueRequest) returns (GetQueueResponse);
  rpc GetQueues (GetQueuesRequest) returns (GetQueuesResponse);
  rpc DeleteQueue (DeleteQueueRequest) returns (DeleteQueueResponse);
}

message CreateQueueRequest {
  string tenantId = 1;
  string code = 2;
  string name = 3;
  string type = 4;
  string state = 5;
  string vnamespace = 6;
  int32 ttlQueue = 7;
  bool allowDuplicated = 8;
  int32 maxAttempts = 9;
  map<int32, int32> desiredPriorityThresholds = 10;
}

message CreateQueueResponse {
  string message = 1;
  Queue result = 2;
}

message BulkCreateQueueRequest {
  string tenantId = 1;
  repeated CreateQueueItem queues = 2;
}

message CreateQueueItem {
  string code = 1;
  string name = 2;
  string type = 3;
  string state = 4;
  string vnamespace = 5;
  int32 ttlQueue = 6;
  bool allowDuplicated = 7;
  int32 maxAttempts = 8;
  map<int32, int32> desiredPriorityThresholds = 9;
}

message BulkCreateQueueResponse {
  string message = 1;
  repeated Queue result = 2;
}

message GetQueueRequest {
  string tenantId = 1;
  string queueId = 2;
}

message GetQueueResponse {
  string message = 1;
  Queue result = 2;
}

message GetQueuesRequest {
  string tenantId = 1;
  string q = 2;
  string cursor = 3;
  int32 pageSize = 4;
  string vnamespace = 5;
}

message Queue {
  string id = 1;
  string code = 2;
  string name = 3;
  string type = 4;
  string state = 5;
  string vnamespace = 6;
  string createdAt = 7;
  string updatedAt = 8;
  int32 ttlQueue = 9;
  bool allowDuplicated = 10;
  int32 maxAttempts = 11;
  map<int32, int32> desiredPriorityThresholds = 12;
  map<int32, int32> priorityThresholds = 13;
}

message QueueFindResult {
  repeated Queue entities = 1;
  string cursor = 2;
}

message GetQueuesResponse {
  string message = 1;
  QueueFindResult result = 2;
}

message DeleteQueueRequest {
  string tenantId = 1;
  string queueId = 2;
}

message DeleteQueueResponse {
  string message = 1;
}

