syntax = "proto3";

package tenant;

option go_package = "pb/tenant;tenant";

service TenantService {
  rpc GetTenantInfo (TenantInfoRequest) returns (TenantInfoResponse);
  rpc AssertTenant (AssertTenantRequest) returns (AssertTenantResponse);
  rpc AssertBulkTenant (AssertBulkTenantRequest) returns (AssertBulkTenantResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
  rpc GetTenants(GetTenantsRequest) returns (GetTenantsResponse);
}

message TenantInfoRequest {
   string ID = 1;
}

message SelfMember {
  string IP = 1;
  int32 Port = 2;
}

message Node {
  SelfMember SelfMember = 1;
  uint64 ShardID = 2;
  repeated string Roles = 3;
}

message TenantInfoResponse {
  string message = 1;
  Tenant result = 2;
  Node node = 3;
}

message DeleteTenantRequest {
  string ID = 1;
}

message DeleteTenantResponse {
  string message = 1;
}

message GetTenantsRequest {
  string q = 1;
  string cursor = 2;
  int32 pageSize = 3;
}

message Tenant {
  string ID = 1;
  string Name = 2;
  string Code = 3;
  int64 ShardId = 4;
  string Status = 5;
  string CreatedAt = 6;
  string UpdatedAt = 7;
}

message FindResult {
  repeated Tenant Entities = 1;
  string Cursor = 2;
}

message GetTenantsResponse {
  string message = 1;
  FindResult result = 2;
}

message AssertTenantRequest {
  string code = 1;
  string name = 2;
}

message AssertBulkTenantRequest {
  repeated AssertTenantRequest tenants = 1;
}

message AssertBulkTenantResponse {
  string message = 1;
  repeated Tenant result = 2;
}

message AssertTenantResponse {
  string message = 1;
  Tenant result = 2;
}

//protoc --go_out=./internal/infrastructure/server/grpc/proto --go-grpc_out=./internal/infrastructure/server/grpc/proto ./internal/infrastructure/server/grpc/proto/definitions/tenant.proto