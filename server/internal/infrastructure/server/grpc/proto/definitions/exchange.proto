syntax = "proto3";

package exchange;

option go_package = "pb/exchange;exchange";

service ExchangeService {
  rpc CreateExchange (CreateExchangeRequest) returns (CreateExchangeResponse);
  rpc BulkCreateExchange (BulkCreateExchangeRequest) returns (BulkCreateExchangeResponse);
  rpc GetExchange (GetExchangeRequest) returns (GetExchangeResponse);
  rpc GetExchanges (GetExchangesRequest) returns (GetExchangesResponse);
  rpc DeleteExchange (DeleteExchangeRequest) returns (DeleteExchangeResponse);
  rpc PublishMessage (PublishMessageRequest) returns (PublishMessageResponse);
}

message CreateExchangeRequest {
  string tenantCode = 1;
  string code = 2;
  string name = 3;
  string type = 4;
  string vnamespace = 5;
  map<string, string> headers = 6;
}

message CreateExchangeResponse {
  string message = 1;
  Exchange result = 2;
}

message BulkCreateExchangeRequest {
  string tenantCode = 1;
  repeated CreateExchangeItem exchanges = 2;
}

message CreateExchangeItem {
  string code = 1;
  string name = 2;
  string type = 3;
  string vnamespace = 4;
  map<string, string> headers = 5;
}

message BulkCreateExchangeResponse {
  string message = 1;
  repeated Exchange result = 2;
}

message GetExchangeRequest {
  string tenantCode = 1;
  string code = 2;
  string vnamespace = 3;
}

message GetExchangeResponse {
  string message = 1;
  Exchange result = 2;
}

message GetExchangesRequest {
  string tenantCode = 1;
  string q = 2;
  string cursor = 3;
  int32 pageSize = 4;
  string vnamespace = 5;
}

message Exchange {
  string ID = 1;
  string Code = 2;
  string Name = 3;
  string Type = 4;
  string VNamespace = 5;
  string CreatedAt = 6;
  string UpdatedAt = 7;
  map<string, string> headers = 8;
}

message ExchangeFindResult {
  repeated Exchange Entities = 1;
  string Cursor = 2;
}

message GetExchangesResponse {
  string message = 1;
  ExchangeFindResult result = 2;
}

message DeleteExchangeRequest {
  string tenantCode = 1;
  string code = 2;
  string vnamespace = 3;
}

message DeleteExchangeResponse {
  string message = 1;
}

message PublishMessageRequest {
  string tenantCode = 1;
  string exchangeCode = 2;
  string routingKeyOrPatternOrQueueCode = 3;
  string vnamespace = 4;
  QueueMessage message = 5;
}

message QueueMessage {
  string messageId = 1;
  string handler = 2;
  int32 priority = 3;
  map<string, string> parameters = 4;
  map<string, string> headers = 5;
  string contentType = 6;
  bytes content = 7;
}

message PublishMessageResponse {
  string message = 1;
  repeated string queueCodes = 2;
}

