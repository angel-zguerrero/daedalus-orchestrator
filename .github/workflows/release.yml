name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  # NX project name for the web-admin Angular app
  WEB_ADMIN_PROJECT: "daedalus-web-admin"
  # Output path produced by nx run daedalus-web-admin:build (production)
  WEB_ADMIN_DIST: "web-admin/dist/daedalus-web-admin/browser"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build the Angular web-admin (once)
  # ─────────────────────────────────────────────
  build-web-admin:
    name: Build web-admin (Angular)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Install all npm dependencies (web-admin lives as a workspace inside the monorepo)
      - name: Install npm dependencies
        run: npm ci

      # Compile the Angular application in production mode via the NX target
      - name: Build web-admin (nx run daedalus-web-admin:build)
        run: npx nx run ${{ env.WEB_ADMIN_PROJECT }}:build

      # Upload the compiled dist so the Go build jobs can download it
      - name: Upload web-admin dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-admin-dist
          path: ${{ env.WEB_ADMIN_DIST }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Build Go server for each target platform
  # ─────────────────────────────────────────────
  build-server:
    name: Build server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build-web-admin
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      # Download the pre-compiled web-admin dist from job 1
      - name: Download web-admin dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-admin-dist
          path: ${{ env.WEB_ADMIN_DIST }}

      # Compile the Go server binary
      - name: Build server binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X deadalus-orch/server/internal/pkg/utils.DefaultEnv=production" \
            -o daedalus-orchestrator${{ matrix.suffix }} \
            ./cmd/main.go

      # Package binary + web-admin dist into a single tarball / zip
      - name: Package release archive
        run: |
          ARCHIVE_NAME="daedalus-orchestrator_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          STAGING_DIR="staging/${ARCHIVE_NAME}"
          mkdir -p "${STAGING_DIR}"

          # Copy the server binary
          cp "server/daedalus-orchestrator${{ matrix.suffix }}" "${STAGING_DIR}/"

          # Copy the compiled web-admin assets
          # The server (in production) expects these at: /var/lib/daedalus/data
          # Ship them under a 'web-admin' sub-directory so operators can place
          # them at the correct location according to their setup.
          cp -r "${{ env.WEB_ADMIN_DIST }}" "${STAGING_DIR}/web-admin"

          # Copy the default config file if present
          [ -f server/daedalus.conf ] && cp server/daedalus.conf "${STAGING_DIR}/" || true

          # Create archive
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd staging && zip -r "../${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}")
            echo "ASSET_PATH=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C staging "${ARCHIVE_NAME}"
            echo "ASSET_PATH=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      # Upload each platform archive as a workflow artifact so the release job can collect them
      - name: Upload platform archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Create the GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download all platform archives produced by the build-server matrix
      - name: Download all release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/

      # Create the GitHub Release and attach all archives
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Daedalus Orchestrator ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4: Build & Publish Docker Image (Multi-Arch)
  # ─────────────────────────────────────────────
  build-docker:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/angel-zguerrero/daedalus-orchestrator:${{ github.ref_name }}
            ghcr.io/angel-zguerrero/daedalus-orchestrator:latest
